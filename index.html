<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A carregar...</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: url('https://i.ibb.co/fzNVLbSC/0008bfb4777ad27b5777ea6aa0a713e7.jpg') no-repeat center center fixed; 
            background-size: cover;
            font-family: Arial, sans-serif;
        }

        .loader-container {
            text-align: center;
        }

        /* Container for the button */
        .button-box {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The rolling border line */
        .rolling-border {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 5px solid transparent;
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-sizing: border-box;
        }

        /* The static black background circle and play icon */
        .play-icon-box {
            width: 80px;
            height: 80px;
            background: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .play-button {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 5px;
        }

        .text {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="button-box">
            <div class="rolling-border"></div>
            <div class="play-icon-box">
                <div class="play-button"></div>
            </div>
        </div>
        <div class="text">Carregando...</div>
    </div>

    <script>
        // Redirects after 3.5 seconds
        setTimeout(function () {
            window.location.href = "https://mypage.name.ng/";
        }, 3500);
    </script>
</body>
